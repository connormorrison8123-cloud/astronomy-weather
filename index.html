
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astronomy Weather Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial; background:#0b0f1a; color:#e0e6ff; text-align:center; }
input, button { padding:10px; margin:10px; font-size:16px; }
.container { display:flex; flex-wrap:wrap; justify-content:space-around; }
.left, .right { width:45%; }
.small { width:30%; }
.card { background:#11182b; padding:20px; margin:20px auto; border-radius:10px; }
canvas { width:100%; }
.clock { font-size:20px; margin-top:10px; }
</style>
</head>
<body>
<h1>Astronomy Weather Viewer</h1>

<input id="zip" placeholder="Enter ZIP Code">
<button onclick="getWeather()">Go</button>

<div id="clock" class="clock"></div>

<div class="container">
  <div class="left card" id="conditions"></div>
  <div class="right card"><canvas id="chart"></canvas></div>
  <div class="small card" id="forecast"></div>
  <div class="small card" id="moon"></div>
</div>

<script>
const API_KEY = "ZSMBVQBG98BSW845P5KQ9VVDE";
let clockInterval = null;

// ENTER key triggers Go
const input = document.getElementById('zip');
input.addEventListener('keypress', function(e){
  if(e.key === 'Enter') getWeather();
});

function startClock(timezone){
  if(clockInterval) clearInterval(clockInterval);
  function tick(){
    const now = new Date();
    const t = new Intl.DateTimeFormat('en-US',{timeZone: timezone, hour:'2-digit', minute:'2-digit', second:'2-digit'}).format(now);
    document.getElementById('clock').innerText = 'Local Time: ' + t;
  }
  tick();
  clockInterval = setInterval(tick, 1000);
}

function estimateLightPollution(zip){
  if(!zip) return {value:0.5,label:'Unknown'};
  if(zip.startsWith('85')) return {value:0.8,label:'Urban'};
  return {value:0.3,label:'Rural'};
}

function telescopeScore(d, light){
  if(!d) return 0;
  return ((1-(d.cloudcover||0)/100)*0.3 +
          (1-(d.humidity||0)/100)*0.15 +
          (1-(d.precipprob||0)/100)*0.1 +
          (1-(d.windspeed||0)/25)*0.15 +
          ((d.visibility||0)/15)*0.15 +
          (2*Math.abs((d.moonphase||0)-0.5))*0.1 +
          (1-light)*0.05)*100;
}

function ratingLabel(s){
  if(s <= 70) return 'Poor';
  if(s <= 80) return 'Decent';
  if(s <= 90) return 'Good';
  return 'Excellent';
}

function moonPhaseName(p){
  return p<0.0625||p>=0.9375?'New Moon':
         p<0.1875?'Waxing Crescent':
         p<0.3125?'First Quarter':
         p<0.4375?'Waxing Gibbous':
         p<0.5625?'Full Moon':
         p<0.6875?'Waning Gibbous':
         p<0.8125?'Last Quarter':'Waning Crescent';
}

function moonEmoji(p){
  return p<0.0625||p>=0.9375?'🌑':
         p<0.1875?'🌒':
         p<0.3125?'🌓':
         p<0.4375?'🌔':
         p<0.5625?'🌕':
         p<0.6875?'🌖':
         p<0.8125?'🌗':'🌘';
}

function windDir(deg){
  if(deg===undefined) return '';
  const dirs=['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(deg/45)%8];
}

function bestViewing(hours, sunset, light){
  if(!hours || !sunset) return 'No data';
  const sH = parseInt(sunset.split(':')[0]);
  const night = hours.filter(h => parseInt(h.datetime.split(':')[0]) >= sH);
  if(!night.length) return 'No nighttime data';
  return night.map(h=>({t:h.datetime, s:telescopeScore(h, light)}))
              .reduce((a,b)=> a.s>b.s?a:b).t;
}

async function getWeather(){
  const zip = document.getElementById('zip').value;
  if(!zip) return alert('Enter ZIP');

  try{
    const url = `https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/${zip}?unitGroup=us&key=${API_KEY}&contentType=json&include=hours`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('API request failed');
    const json = await res.json();

    if(!json.days || !json.days.length) throw new Error('No data for ZIP');

    startClock(json.timezone);

    const d = json.days[0];
    const current = json.currentConditions || d;
    const light = estimateLightPollution(zip);

    const score = telescopeScore(d, light.value);
    const rating = ratingLabel(score);

    document.getElementById('conditions').innerHTML = `
      <h2>${json.resolvedAddress}</h2>
      <h3>Current Temp: ${current.temp}°F</h3>
      <p><b>Conditions:</b> ${d.conditions}</p>
      <p><b>Temp:</b> ${d.tempmin}–${d.tempmax}°F</p>
      <p><b>Humidity:</b> ${d.humidity}%</p>
      <p><b>Wind:</b> ${d.windspeed} mph ${windDir(d.winddir)}</p>
      <p><b>Cloud Cover:</b> ${d.cloudcover}%</p>
      <p><b>Visibility:</b> ${d.visibility} miles</p>
      <p><b>Moon:</b> ${moonPhaseName(d.moonphase)}</p>
      <p><b>Light Pollution:</b> ${light.label}</p>
      <h3><b>Telescope Rating:</b> ${score.toFixed(1)}% (${rating})</h3>
      <p><b>Best Viewing:</b> ${bestViewing(d.hours, d.sunset, light.value)}</p>`;

    const sunsetHour = parseInt(d.sunset.split(':')[0]);
    const night = (d.hours||[]).filter(h => parseInt(h.datetime.split(':')[0]) >= sunsetHour);

    const ctx = document.getElementById('chart').getContext('2d');
    if(window.chart && typeof window.chart.destroy==='function') window.chart.destroy();

    window.chart = new Chart(ctx, {
      type:'line',
      data:{
        labels: night.map(h=>h.datetime),
        datasets:[{label:'Night Cloud Cover (%)', data: night.map(h=>h.cloudcover)}]
      }
    });

    let f = '<h3>Telescope Rating</h3>';
    json.days.slice(0,7).forEach(day => {
      const s = telescopeScore(day, light.value);
      f += `<p>${day.datetime}: ${s.toFixed(0)}%</p>`;
    });
    document.getElementById('forecast').innerHTML = f;

    let m = '<h3>Moon Phases</h3>';
    json.days.slice(0,7).forEach(day => {
      m += `<p>${day.datetime}: ${moonPhaseName(day.moonphase)} ${moonEmoji(day.moonphase)}</p>`;
    });
    document.getElementById('moon').innerHTML = m;

  }catch(e){
    console.error(e);
    alert('API or ZIP error');
  }
}
</script>
</body>
</html>
