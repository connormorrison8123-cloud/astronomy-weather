
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astronomy Weather Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: url('./images/stars/star_cluster.png') no-repeat center center fixed;
  background-size: cover;
  color:#e0e6ff;
  text-align:center;
  overflow-y: auto;
}

.main {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  height:auto; /* allow content to show */
  padding-top:100px;
}


.search-container {
  margin-bottom:20px;
  margin-top:-10px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

#zip {
  width: 420px;
  max-width: 80vw;
  padding: 14px 16px;
  border-radius: 24px;
  border: none;
  outline: none;
  font-size: 18px;
}

.suggestions {
  width: 420px;
  max-width: 80vw;
  background: #11182b;
  border-radius: 12px;
  margin-top: 6px;
  text-align: left;
  overflow: hidden;
}

.suggestion-item {
  padding: 10px 14px;
  cursor: pointer;
}

.suggestion-item:hover {
  background: #1b2542;
}

.content {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:40px;
  width:100%;
  max-width:1100px;
  margin-top: -50px;
}

.left, .right {
  width:45%;
}

.card {
  padding:8px;
  margin:5px auto;
  font-size:13px;
}

#forecast-content {
  margin-top: -30px;
  text-align:center;
}

/* ADJUST GRAPH HEIGHT HERE */
canvas { width:100%; height:220px; }

/* ADJUST CLOCK POSITION HERE */
.clock {
  position: absolute;
  top: 5px;
  left: 50%;
  transform: translateX(-50%);
  font-size:20px;
}

.moon-img {
  display:block;
  margin:12px auto;
}

.header {
  position:absolute;
  top:20px;
  left:20px;
  text-align:left;
}

.header h1 {
  margin:0;
  font-size:28px;
}

.header p {
  margin:0;
  font-size:14px;
  color:#aaa;
}

html, body { height:100%; }

/* HOME FACT CENTERING */
.home-fact {
  max-width: 700px;
  width:100%;
  text-align: center;
  margin-top: -40px;
}

.home-fact img {
  width: 100%;
  max-width: 500px;
  border-radius: 12px;
  margin-top: 10px;
}

</style>
</head>

<body>

<div class="header">
  <h1>Astronomy Weather</h1>
  <p>Worldwide</p>
</div>

<div class="main">
  <div class="search-container">
    <input id="zip" placeholder="Search city or ZIP">
    <div id="suggestions" class="suggestions"></div>
  </div>

  <div class="content">
    <div class="left card" id="conditions"></div>
    <div class="right card"><canvas id="chart"></canvas></div>
  </div>

  <div id="forecast-content"></div>
</div>

<div id="clock" class="clock"></div>

<script>


// ---- AUTOCOMPLETE ----
const input = document.getElementById('zip');
const suggestionsEl = document.getElementById('suggestions');
let debounceTimer;

input.addEventListener('input', () => {
  const q = input.value.trim();
  clearTimeout(debounceTimer);
  if (!q) { suggestionsEl.innerHTML=''; return; }

  debounceTimer = setTimeout(async () => {
    const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=5`);
    const data = await res.json();
    const results = data.results || [];

    suggestionsEl.innerHTML = results.map(r => {
      const label = `${r.name}${r.admin1 ? ', ' + r.admin1 : ''}, ${r.country}`;
      return `<div class="suggestion-item" data-name="${label}">${label}</div>`;
    }).join('');
  }, 250);
});

suggestionsEl.addEventListener('click', (e) => {
  const item = e.target.closest('.suggestion-item');
  if (!item) return;
  input.value = item.dataset.name;
  suggestionsEl.innerHTML = '';
  getWeather();
});

document.getElementById('zip').addEventListener('keypress', e=>{
  if(e.key==='Enter') getWeather();
});

// ---- VIEWING SCORE FORECAST HELPERS ----
function windDir(deg){
  const dirs = ['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(deg/45)%8];
}

function scoreColor(s){
  if (s < 70) return '#e89a9a';
  if (s < 80) return '#e8d88a';
  if (s < 90) return '#b7e4c7';
  return '#2d6a4f';
}

function telescopeScore(d, light){
  return (
    (1 - (d.cloudcover||0)/100)*0.3 +
    (1 - (d.humidity||0)/100)*0.15 +
    (1 - (d.precipprob||0)/100)*0.1 +
    (1 - (d.windspeed||0)/25)*0.15 +
    ((d.visibility||0)/15)*0.15 +
    (2*Math.abs((d.moonphase||0)-0.5))*0.1 +
    (1-light)*0.05
  ) * 100;
}

function estimateLightPollution(address){
  const a = address.toLowerCase();
  if(a.includes('new york') || a.includes('los angeles') || a.includes('chicago') || a.includes('london') || a.includes('tokyo')) return 0.8;
  if(a.includes('phoenix') || a.includes('dallas') || a.includes('miami')) return 0.6;
  return 0.3;
}

function buildNightHours(hours, sunsetStr, sunriseNextStr){
  const today = new Date();
  const [sh, sm] = sunsetStr.split(':').map(Number);
  const [rh, rm] = sunriseNextStr.split(':').map(Number);
  const sunset = new Date(today.getFullYear(), today.getMonth(), today.getDate(), sh, sm);
  const sunriseNext = new Date(today.getFullYear(), today.getMonth(), today.getDate()+1, rh, rm);

  return hours.map(h=>{
    const [hh, mm] = h.datetime.split(':').map(Number);
    let d = new Date(today.getFullYear(), today.getMonth(), today.getDate(), hh, mm);
    if(hh < 12) d = new Date(today.getFullYear(), today.getMonth(), today.getDate()+1, hh, mm);
    return {...h, date:d};
  }).filter(h => h.date >= sunset && h.date <= sunriseNext);
}

let chart;

function updateClock(){
  const now = new Date();
  const el = document.getElementById('clock');
  if (el) el.innerText = "Local Time: " + now.toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();
async function getWeather(){
  // Removed showSection('forecast');
  // Removed document.body.classList.add('searched');
  document.body.classList.remove('lock-scroll');

  const zip = document.getElementById('zip').value;
  if(!zip) return;

  const res = await fetch(`https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/${zip}?unitGroup=us&key=ZSMBVQBG98BSW845P5KQ9VVDE&contentType=json&include=hours`);
  const json = await res.json();

  const d = json.days[0];
  const dNext = json.days[1] || d;

  const light = estimateLightPollution(json.resolvedAddress);
  const score = telescopeScore(d, light);

  // moon image helper
  function getMoonImage(p){
    if (p < 0.0625 || p >= 0.9375) return "./images/moon/moon_new.png";
    if (p < 0.1875) return "./images/moon/moon_waxing_crescent.png";
    if (p < 0.3125) return "./images/moon/moon_first_quarter.png";
    if (p < 0.4375) return "./images/moon/moon_waxing_gibbous.png";
    if (p < 0.5625) return "./images/moon/moon_full.png";
    if (p < 0.6875) return "./images/moon/moon_waning_gibbous.png";
    if (p < 0.8125) return "./images/moon/moon_last_quarter.png";
    return "./images/moon/moon_waning_crescent.png";
  }

  function moonPhaseName(p){
    if (p < 0.0625 || p >= 0.9375) return "New Moon";
    if (p < 0.1875) return "Waxing Crescent";
    if (p < 0.3125) return "First Quarter";
    if (p < 0.4375) return "Waxing Gibbous";
    if (p < 0.5625) return "Full Moon";
    if (p < 0.6875) return "Waning Gibbous";
    if (p < 0.8125) return "Last Quarter";
    return "Waning Crescent";
  }

  const night = buildNightHours(d.hours, d.sunset, dNext.sunrise);

  document.getElementById('conditions').innerHTML = `
    <h2>${json.resolvedAddress}</h2>
    <h3>Current Temp: ${json.currentConditions?.temp || d.temp}°F</h3>

    <p><b>Conditions:</b> ${d.conditions}</p>
    <p><b>Temp:</b> ${d.tempmin}–${d.tempmax}°F</p>
    <p><b>Humidity:</b> ${d.humidity}%</p>
    <p><b>Wind:</b> ${d.windspeed} mph ${windDir(d.winddir)}</p>
    <p><b>Visibility:</b> ${d.visibility} miles</p>

    <p><b>Sunset:</b> ${d.sunset}</p>
    <p><b>Sunrise:</b> ${d.sunrise}</p>

    <p><b>Light Pollution:</b> ${(light*100).toFixed(0)}%</p>

    <p><b>Moon Phase:</b> ${moonPhaseName(d.moonphase)}</p>
    <img class="moon-img" src="${getMoonImage(d.moonphase)}" style="width:120px;">

    <h3>Viewing Score: ${score.toFixed(1)}%</h3>
  `;

  if(chart) chart.destroy();
  chart = new Chart(document.getElementById('chart'), {
    type:'line',
    data:{
      labels: night.map(h=>h.datetime),
      datasets:[{
        data: night.map(h=>telescopeScore(h, light)),
        borderColor:'#444444',
        segment:{ borderColor: ctx => scoreColor(ctx.p1.parsed.y) },
        pointRadius: 4,
        pointStyle: 'circle',
        pointBackgroundColor: ctx => scoreColor(ctx.parsed.y),
        pointBorderColor: '#444444',
        pointBorderWidth: 1
      }]
    },
    options:{
      maintainAspectRatio:false,
      plugins:{ legend:{display:false}, title:{display:true, text:'Viewing Score'} },
      scales:{
        y:{ min:0, max:100, grid:{color:'#444'}, ticks:{color:'#e0e6ff'} },
        x:{ grid:{color:'#444'}, ticks:{color:'#e0e6ff'} }
      }
    }
  });

  document.getElementById('forecast-content').innerHTML = `
    <h3 style="width:100%">Viewing Score Forecast</h3>
    <div style="display:flex; gap:8px; font-size:11px; justify-content:center;">
      ${json.days.slice(0,7).map(day=>`
        <div style="color:white; min-width:90px;">
          <div style="font-weight:bold;">${day.datetime}</div>
          <div>${telescopeScore(day, light).toFixed(0)}%</div>
        </div>
      `).join('')}
    </div>
  `;
}

window.addEventListener('DOMContentLoaded', () => {
});

</script>

</body>
</html>
